name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Check tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          echo "Tag version: $TAG_VERSION | package.json version: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::A tag ($TAG_VERSION) não corresponde à versão do package.json ($PKG_VERSION)"
            exit 1
          fi

      - name: Package extension
        run: |
          mkdir -p dist
          vsce package --out "dist/language-mkq-${GITHUB_REF_NAME#v}.vsix"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "dist/*.vsix"
          generate_release_notes: true
